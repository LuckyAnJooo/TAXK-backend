name: Java CI

on:
  push:
    branches: [ "main","CI/API/Test/kara"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: taxk
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Spring Boot app
        run: ./mvnw package -DskipTests
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/taxk
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}

      - name: Start Spring Boot app
        run: java -jar target/*.jar &
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/taxk
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}

      - name: Wait for app to start (health check)
        run: |
          for i in {1..20}; do
            if curl -s http://localhost:8080/actuator/health | grep -q 'UP'; then
              echo "✅ App started successfully!"
              exit 0
            fi
            echo "⏳ Waiting for app to start... ($i/20)"
            sleep 3
          done
          echo "❌ App failed to start after 60s"
          exit 1

      - name: Setup Node.js 20 (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install/Upgrade Apifox CLI to latest
        run: npm install -g apifox-cli@latest --unsafe-perm

      - name: Verify Apifox CLI version and --variable support
        run: |
          apifox --version
          apifox run --help | grep -i variable

      - name: Running Test Scenario
        env:
          APIFOX_ACCESS_TOKEN: ${{ secrets.APIFOX_ACCESS_TOKEN }}
        run: apifox run --access-token "$APIFOX_ACCESS_TOKEN" -t 8107676 -e 43830747 -n 1 -r html,cli --variable "baseUrl=http://localhost:8080"