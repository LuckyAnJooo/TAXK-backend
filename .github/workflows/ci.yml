name: Java CI

on:
  push:
    branches: [ "main","CI/API/Test/kara"]


jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: taxk
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Spring Boot app
        run: ./mvnw package -DskipTests
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/taxk
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}


      - name: Start Spring Boot app
        run: java -jar target/*.jar &
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/taxk
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}

      - name: Wait for app to start
        run: sleep 15

      - name: Setup Node.js environment
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Install Apifox CLI
        run: npm install -g apifox-cli

      - name: Running Test Scenario
        run: apifox run --access-token $APIFOX_API_TOKEN -t 8107676 -e 43830747 -n 1 -r html,cli